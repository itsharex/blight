name: Release

on:
  push:
    branches: [master, dev]
    paths:
      - 'wails.json'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      prerelease: ${{ steps.check.outputs.prerelease }}
      channel: ${{ steps.check.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for version bump
        id: check
        run: |
          VERSION=$(jq -r '.info.productVersion' wails.json)
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Determine release channel from branch
          if [ "$BRANCH" = "master" ]; then
            CHANNEL="alpha"
          elif [ "$BRANCH" = "dev" ]; then
            CHANNEL="prelight"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $VERSION ($CHANNEL)"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: blight-windows-amd64-setup
            artifact_path: blight-windows-amd64-setup.exe
          - os: ubuntu-latest
            artifact_name: blight-linux-amd64-tar-gz
            artifact_path: blight-linux-amd64.tar.gz
          - os: macos-latest
            artifact_name: blight-macos-amd64-dmg
            artifact_path: blight-macos-amd64.dmg
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libayatana-appindicator3-dev libx11-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Set up webkit2gtk-4.0 pkg-config shim
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! pkg-config --exists webkit2gtk-4.0 && pkg-config --exists webkit2gtk-4.1; then
            mkdir -p "$HOME/.pkgconfig"
            printf 'Name: webkit2gtk-4.0\nDescription: Compatibility shim for webkit2gtk-4.1\nVersion: 4.0\nRequires: webkit2gtk-4.1\n' > "$HOME/.pkgconfig/webkit2gtk-4.0.pc"
            printf 'Name: javascriptcoregtk-4.0\nDescription: Compatibility shim for javascriptcoregtk-4.1\nVersion: 4.0\nRequires: javascriptcoregtk-4.1\n' > "$HOME/.pkgconfig/javascriptcoregtk-4.0.pc"
            echo "PKG_CONFIG_PATH=$HOME/.pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        if: matrix.os == 'windows-latest'
        run: wails build -nsis -ldflags "-X main.Version=${{ needs.check-version.outputs.version }}"

      - name: Rename installer
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp build/bin/blight-amd64-installer.exe blight-windows-amd64-setup.exe

      - name: Build Linux package
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          wails build -ldflags "-X main.Version=${{ needs.check-version.outputs.version }}"
          tar -C build/bin -czf blight-linux-amd64.tar.gz blight

      - name: Build macOS installer
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          wails build -ldflags "-X main.Version=${{ needs.check-version.outputs.version }}"
          hdiutil create -volname "blight" -srcfolder "build/bin/blight.app" -ov -format UDZO blight-macos-amd64.dmg

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        env:
          REPO: devatblight/blight
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          {
            echo "changelog<<CHANGELOG_EOF"

            if [ -z "$PREV_TAG" ]; then
              RAW=$(git log --oneline --no-merges | head -30)
            else
              RAW=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
            fi

            # Drop version-bump commits — they're noise
            COMMITS=$(echo "$RAW" | grep -v -iE \
              "(bump version|update wails\.json|update version|bump package)" \
              || true)

            if [ -z "$COMMITS" ]; then
              echo "_No notable changes._"
            else
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                HASH=$(echo "$line" | cut -d' ' -f1)
                MSG=$(echo "$line" | cut -d' ' -f2-)
                echo "- [\`${HASH}\`](https://github.com/${REPO}/commit/${HASH}) ${MSG}"
              done <<< "$COMMITS"
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: "blight ${{ needs.check-version.outputs.tag }}"
          prerelease: ${{ needs.check-version.outputs.prerelease }}
          body: |
            > [!WARNING]
            > This is an early **${{ needs.check-version.outputs.channel }}** build — things may be rough. [Report issues here.](../../issues)

            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Install

            Download the installer/package for your platform from the assets below:
            - **Windows:** `blight-windows-amd64-setup.exe`
            - **Linux:** `blight-linux-amd64.tar.gz`
            - **macOS:** `blight-macos-amd64.dmg`

            ---

            Built from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) · `${{ github.ref_name }}`
          files: |
            artifacts/blight-windows-amd64-setup/*
            artifacts/blight-linux-amd64-tar-gz/*
            artifacts/blight-macos-amd64-dmg/*
