name: Build Check

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-3-dev libayatana-appindicator3-dev libx11-dev libwebkit2gtk-4.1-dev
          version: 1.0

      - name: Set up webkit2gtk-4.0 pkg-config shim
        if: matrix.os == 'ubuntu-latest'
        run: |
          if ! pkg-config --exists webkit2gtk-4.0 && pkg-config --exists webkit2gtk-4.1; then
            mkdir -p "$HOME/.pkgconfig"
            printf 'Name: webkit2gtk-4.0\nDescription: Compatibility shim for webkit2gtk-4.1\nVersion: 4.0\nRequires: webkit2gtk-4.1\n' > "$HOME/.pkgconfig/webkit2gtk-4.0.pc"
            printf 'Name: javascriptcoregtk-4.0\nDescription: Compatibility shim for javascriptcoregtk-4.1\nVersion: 4.0\nRequires: javascriptcoregtk-4.1\n' > "$HOME/.pkgconfig/javascriptcoregtk-4.0.pc"
            echo "PKG_CONFIG_PATH=$HOME/.pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Install NSIS
        if: matrix.os == 'windows-latest'
        run: choco install nsis -y

      - name: Build installer/package (dry run — no upload)
        if: matrix.os == 'windows-latest'
        run: wails build -nsis -ldflags "-X main.Version=0.0.0-ci"

      - name: Build app package (dry run — no upload)
        if: matrix.os != 'windows-latest'
        run: wails build -ldflags "-X main.Version=0.0.0-ci"
